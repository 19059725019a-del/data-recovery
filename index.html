<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数据恢复检测单</title>
<style>
/* 保持你原来的精美样式不变 */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: linear-gradient(160deg, #0a0a1a 0%, #1a1a3e 40%, #2d1b69 100%); min-height: 100vh; color: #fff; padding: 0 0 60px; }
.container { max-width: 440px; margin: 0 auto; padding: 16px; }
.header { text-align: center; padding: 32px 0 20px; }
.header h1 { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #00cec9, #6C5CE7, #fd79a8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 24px 20px; margin-bottom: 16px; backdrop-filter: blur(20px); }
.option-item { display: flex; align-items: center; gap: 14px; padding: 15px 16px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.06); cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
.option-item.selected { background: rgba(108,92,231,0.15); border-color: rgba(108,92,231,0.6); }
.input-field { width: 100%; padding: 15px 16px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: #fff; font-size: 16px; margin-top: 8px; }
.btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
.btn-next { background: linear-gradient(135deg, #6C5CE7, #a855f7); color: #fff; }
.btn-submit { background: linear-gradient(135deg, #00cec9, #00b894); color: #fff; }
.page { display: none; }
.page.active { display: block; }
.advice-box { margin-top: 16px; padding: 18px; border-radius: 16px; background: rgba(0,206,201,0.08); border: 1px solid rgba(0,206,201,0.12); }
.copy-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: #00cec9; color: #fff; font-weight: 700; margin-top: 15px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📱 数据恢复检测单</h1>
    <p>专业检测 · 快速评估 · 隐私保障</p>
  </div>

  <div class="page active" id="page1">
    <div class="card">
      <h3>1. 手机类型</h3><br>
      <div class="option-list">
        <div class="option-item" onclick="setD('phoneType','苹果 iPhone',1)">🍎 苹果 iPhone</div>
        <div class="option-item" onclick="setD('phoneType','华为',1)">📲 华为</div>
        <div class="option-item" onclick="setD('phoneType','小米/OPPO/vivo',1)">📱 其他安卓</div>
      </div>
    </div>
  </div>

  <div class="page" id="page2">
    <div class="card">
      <h3>2. 丢失时间</h3><br>
      <div class="option-list">
        <div class="option-item" onclick="setD('lostTime','1个月内',2)">🟢 1个月内</div>
        <div class="option-item" onclick="setD('lostTime','半年以上',2)">🔴 半年以上</div>
      </div>
    </div>
  </div>

  <div class="page" id="page3">
    <div class="card">
      <h3>3. 恢复内容</h3><br>
      <div class="option-list">
        <div class="option-item" onclick="setD('dataType','微信聊天记录',3)">💬 微信聊天记录</div>
        <div class="option-item" onclick="setD('dataType','相册照片',3)">🖼️ 相册照片</div>
      </div>
    </div>
  </div>

  <div class="page" id="page4">
    <div class="card">
      <h3>4. 联系方式</h3><br>
      <input type="tel" id="uPhone" class="input-field" placeholder="请输入手机号">
      <input type="text" id="uWechat" class="input-field" placeholder="微信号 (选填)">
      <button class="btn btn-submit" onclick="doSubmit()">提交并生成报告</button>
    </div>
  </div>

  <div class="page" id="pageResult">
    <div class="card">
      <h2 style="text-align:center">✅ 检测报告已生成</h2>
      <div class="advice-box">
        <div style="font-size:30px; color:#00cec9; text-align:center" id="resRate">95%</div>
        <p style="text-align:center; font-size:12px; color:rgba(255,255,255,0.5)">预计恢复成功率</p>
        <p id="resText" style="margin-top:15px; font-size:14px; line-height:1.6"></p>
      </div>
      <p style="margin-top:15px; font-size:12px; color:gray">提示：工程师已收到您的申请，将尽快联系您。您可以点击下方按钮复制结果发给客服，加快处理进度。</p>
      <button class="copy-btn" onclick="copyResult()">📋 点击复制检测报告</button>
    </div>
  </div>
</div>

<script>
let D = { phoneType:'', lostTime:'', dataType:'', phone:'', wechat:'' };

function setD(key, val, nowStep) {
  D[key] = val;
  document.getElementById('page'+nowStep).style.display = 'none';
  document.getElementById('page'+(nowStep+1)).style.display = 'block';
}

function doSubmit() {
  D.phone = document.getElementById('uPhone').value;
  D.wechat = document.getElementById('uWechat').value || '未填';
  
  if(!/^1\d{10}$/.test(D.phone)) { alert('请输入正确的手机号'); return; }

  // 计算概率
  let rate = D.lostTime === '1个月内' ? '92%-98%' : '65%-80%';
  document.getElementById('resRate').innerText = rate;
  document.getElementById('resText').innerText = `针对您的${D.phoneType}设备，我们将通过底层数据库扫描技术尝试找回${D.dataType}。请保持手机开机并关闭自动更新。`;

  // 发送数据到你的邮箱 (FormSubmit)
  // 这是目前最稳定的方案，完全不卡顿
  fetch("https://formsubmit.co/ajax/575205396@qq.com", {
    method: "POST",
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({
      "主题": "新客户检测单",
      "手机": D.phone,
      "微信": D.wechat,
      "内容": D.dataType,
      "时间": D.lostTime,
      "机型": D.phoneType,
      "预测成功率": rate
    })
  });

  document.getElementById('page4').style.display = 'none';
  document.getElementById('pageResult').style.display = 'block';
}

function copyResult() {
  let text = `📋 数据恢复检测报告\n机型：${D.phoneType}\n需求：${D.dataType}\n时间：${D.lostTime}\n联系方式：${D.phone}`;
  navigator.clipboard.writeText(text);
  alert('已复制！请粘贴给客服。');
}
</script>

</body>
</html>
